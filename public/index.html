<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remote Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0d12;
    --panel: #121722;
    --panel-2: #181e2b;
    --panel-3: #212838;
    --border: #283042;
    --text: #ecf1ff;
    --muted: #9ba6bd;
    --accent: #7dd3fc;
    --accent-2: #9ef0b8;
    --warn: #f7b267;
    --danger: #f38ba8;
  }

  html, body {
    min-height: 100%;
    background:
      radial-gradient(circle at top, rgba(125, 211, 252, 0.18), transparent 28%),
      linear-gradient(180deg, #081018 0%, #0b0d12 55%, #0a0c11 100%);
    color: var(--text);
    font-family: "Inter", "Segoe UI", sans-serif;
    font-size: 14px;
  }

  body {
    margin: 0;
  }

  .app-shell {
    min-height: 100vh;
    max-width: 760px;
    margin: 0 auto;
    padding: 18px 14px 144px;
  }

  .top-bar,
  .engine-switch,
  .composer,
  .settings-sheet,
  .user-card,
  .run-card,
  .msg-body {
    border: 1px solid var(--border);
    background: rgba(18, 23, 34, 0.82);
    backdrop-filter: blur(14px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-radius: 22px;
    padding: 16px 18px;
  }

  .brand-copy {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .brand-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .brand-title span {
    color: var(--accent);
  }

  .brand-subtitle {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .top-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .engine-switch {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 14px;
    border-radius: 18px;
    padding: 8px;
  }

  .engine-chip {
    border: 0;
    border-radius: 14px;
    padding: 12px 14px;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
  }

  .engine-chip.active {
    background: linear-gradient(135deg, rgba(125, 211, 252, 0.22), rgba(158, 240, 184, 0.18));
    color: var(--text);
  }

  .engine-chip:hover,
  .icon-button:hover,
  .secondary-btn:hover,
  .send-btn:hover {
    transform: translateY(-1px);
  }

  .status-pill,
  .icon-button,
  .secondary-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(33, 40, 56, 0.9);
    color: var(--text);
    padding: 10px 14px;
    font: inherit;
  }

  .status-pill.online .status-dot {
    background: var(--accent-2);
    box-shadow: 0 0 18px rgba(158, 240, 184, 0.45);
  }

  .status-pill.offline .status-dot {
    background: var(--danger);
    box-shadow: 0 0 18px rgba(243, 139, 168, 0.32);
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: var(--danger);
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }

  .session-feed {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 16px;
    min-height: 40vh;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .msg-header {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .msg-header .tag {
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.06);
  }

  .tag-user { color: var(--accent-2); }
  .tag-claude,
  .tag-codex,
  .tag-system { color: var(--accent); }
  .tag-err { color: var(--danger); }

  .msg-body,
  .user-card,
  .run-card {
    border-radius: 22px;
    padding: 16px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-body,
  .card-copy,
  .run-card-body {
    font-family: "JetBrains Mono", "Consolas", monospace;
    font-size: 13px;
  }

  .card-label {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card-title {
    margin-top: 4px;
    font-size: 18px;
    font-weight: 600;
  }

  .run-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .run-card-body {
    margin-top: 12px;
  }

  .run-chunk {
    padding: 12px;
    border-radius: 16px;
    background: rgba(33, 40, 56, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .run-chunk + .run-chunk {
    margin-top: 10px;
  }

  .run-chunk-tool {
    border-color: rgba(125, 211, 252, 0.36);
  }

  .run-chunk-err {
    border-color: rgba(243, 139, 168, 0.42);
  }

  .run-status-running {
    box-shadow: 0 24px 64px rgba(125, 211, 252, 0.12);
  }

  .run-status-completed {
    box-shadow: 0 24px 64px rgba(158, 240, 184, 0.10);
  }

  .run-status-interrupted,
  .run-status-error {
    box-shadow: 0 24px 64px rgba(243, 139, 168, 0.12);
  }

  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .composer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    margin: 0 auto;
    width: min(760px, calc(100vw - 16px));
    border-radius: 22px 22px 0 0;
    padding: 14px;
  }

  .composer-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #prompt-input {
    flex: 1;
    min-height: 52px;
    max-height: 220px;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: rgba(9, 13, 20, 0.75);
    color: var(--text);
    padding: 14px 16px;
    font: inherit;
    line-height: 1.5;
    outline: none;
  }

  #prompt-input:focus,
  .settings-input:focus {
    border-color: var(--accent);
  }

  .send-btn {
    height: 52px;
    min-width: 96px;
    border: 0;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--accent), #60a5fa);
    color: #061018;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
  }

  .send-btn.stop {
    background: linear-gradient(135deg, #fb7185, var(--danger));
    color: white;
  }

  .hint {
    margin-top: 10px;
    color: var(--muted);
    font-size: 11px;
  }

  .hint kbd {
    background: rgba(33, 40, 56, 0.92);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 8px;
  }

  .settings-drawer {
    position: fixed;
    inset: 0;
    display: none;
    background: rgba(5, 8, 14, 0.48);
    z-index: 40;
  }

  .settings-drawer.open {
    display: block;
  }

  .settings-sheet {
    position: absolute;
    left: 12px;
    right: 12px;
    bottom: 12px;
    border-radius: 24px;
    padding: 18px;
  }

  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .settings-label {
    display: block;
    margin-bottom: 8px;
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .settings-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: rgba(9, 13, 20, 0.75);
    color: var(--text);
    padding: 12px 14px;
    font: inherit;
    outline: none;
  }

  .settings-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .settings-meta {
    margin-top: 14px;
    color: var(--muted);
    font-size: 12px;
  }

  .code-block {
    background: rgba(9, 13, 20, 0.82);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin: 10px 0;
    overflow-x: auto;
  }

  .code-block-header {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .code-block pre {
    margin: 0;
    padding: 12px 14px;
  }

  .msg-body code {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.06);
    padding: 2px 6px;
    border-radius: 8px;
  }

  #auth-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    z-index: 100;
    background: rgba(6, 10, 16, 0.88);
    backdrop-filter: blur(10px);
  }

  .auth-box {
    width: min(360px, 100%);
    border-radius: 24px;
    border: 1px solid var(--border);
    background: rgba(18, 23, 34, 0.92);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
  }

  .auth-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
  }

  .auth-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: rgba(9, 13, 20, 0.75);
    color: var(--text);
    font: inherit;
    padding: 14px 16px;
    outline: none;
  }

  .auth-input:focus {
    border-color: var(--accent);
  }

  .auth-btn {
    border: 0;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), #60a5fa);
    color: #061018;
    font: inherit;
    font-weight: 700;
    padding: 14px 16px;
    cursor: pointer;
  }

  .auth-err {
    color: var(--danger);
    font-size: 12px;
    display: none;
  }

  @media (min-width: 768px) {
    .app-shell {
      padding-left: 22px;
      padding-right: 22px;
    }

    .composer {
      width: min(760px, calc(100vw - 40px));
    }

    .settings-sheet {
      left: auto;
      right: max(20px, calc((100vw - 760px) / 2));
      width: 360px;
    }
  }
</style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-title">Remote Agent <span style="color:var(--accent)">&#x2022;</span></div>
    <div style="color:var(--muted);font-size:11px">输入访问令牌</div>
    <input id="token-input" class="auth-input" type="password" placeholder="AUTH_TOKEN" />
    <div id="auth-err" class="auth-err">令牌错误，请重试</div>
    <button class="auth-btn" onclick="doAuth()">连接</button>
  </div>
</div>

<div id="app-shell" class="app-shell" style="display:none">
  <header id="top-bar" class="top-bar">
    <div class="brand-copy">
      <div class="brand-title">Remote<span>.</span>Agent</div>
      <div class="brand-subtitle">Mobile Workbench</div>
    </div>
    <div class="top-actions">
      <div id="connection-pill" class="status-pill offline">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">OFFLINE</span>
      </div>
      <button id="settings-toggle" class="icon-button" type="button">设置</button>
    </div>
  </header>

  <section id="engine-switch" class="engine-switch">
    <button class="engine-chip active" id="tab-claude" type="button" onclick="setEngine('claude')">Claude</button>
    <button class="engine-chip" id="tab-codex" type="button" onclick="setEngine('codex')">Codex</button>
  </section>

  <main id="session-feed" class="session-feed"></main>

  <form id="composer" class="composer" onsubmit="event.preventDefault(); sendOrStop();">
    <div class="composer-row">
      <textarea id="prompt-input" placeholder="输入你的 prompt，Ctrl+Enter 发送…" rows="2"></textarea>
      <button id="send-btn" class="send-btn" type="submit">发送</button>
    </div>
    <div class="hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> 发送 &nbsp;·&nbsp; <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</div>
  </form>

  <aside id="settings-drawer" class="settings-drawer" aria-hidden="true">
    <div class="settings-sheet">
      <div class="settings-header">
        <strong>会话设置</strong>
        <button id="settings-close" class="icon-button" type="button">关闭</button>
      </div>
      <label class="settings-label" for="cwd-input">工作目录</label>
          <input id="cwd-input" class="settings-input" type="text" placeholder="C:\Users\…\project" />
          <div class="settings-actions">
            <button id="clear-chat-btn" class="secondary-btn" type="button">清空会话</button>
          </div>
          <div id="token-summary" class="settings-meta">Token stored locally</div>
        </div>
      </aside>
</div>

<script>
let TOKEN = localStorage.getItem('agent_token') || '';
let engine = 'claude';
let currentReader = null;
let currentSessionId = null;
let activeRunId = null;
let streaming = false;
let settingsDrawerOpen = false;
let connectionStatus = 'offline';
let messages = [];
let streamBuffer = '';

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function renderChunkText(text) {
  const escaped = escapeHtml(text);
  const withBlocks = escaped.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
    return '<div class="code-block"><div class="code-block-header"><span>' + (lang || 'code') + '</span></div><pre>' + code + '</pre></div>';
  });
  return withBlocks.replace(/`([^`\n]+)`/g, '<code>$1</code>');
}

function formatRunStatus(status) {
  if (status === 'running') return 'RUNNING';
  if (status === 'completed') return 'COMPLETED';
  if (status === 'interrupted') return 'INTERRUPTED';
  if (status === 'error') return 'ERROR';
  return 'IDLE';
}

function addUserMessage(text) {
  messages.push({
    id: crypto.randomUUID(),
    kind: 'user',
    text: text
  });
  renderFeed();
}

function startAgentRun(activeEngine) {
  const run = {
    id: crypto.randomUUID(),
    kind: 'run',
    engine: activeEngine,
    status: 'running',
    chunks: []
  };
  messages.push(run);
  renderFeed();
  return run.id;
}

function appendRunChunk(runId, chunkType, text) {
  const run = messages.find(function(entry) {
    return entry.id === runId;
  });
  if (!run) return;
  run.chunks.push({ type: chunkType, text: text || '' });
  renderFeed();
}

function finishAgentRun(runId, statusLabel) {
  const run = messages.find(function(entry) {
    return entry.id === runId;
  });
  if (!run) return;
  run.status = statusLabel;
  renderFeed();
}

function renderEntry(entry) {
  if (entry.kind === 'user') {
    return '<article class="user-card"><div class="card-label">YOU</div><div class="card-copy">' + escapeHtml(entry.text) + '</div></article>';
  }

  const chunks = entry.chunks.map(function(chunk) {
    return '<div class="run-chunk run-chunk-' + chunk.type + '">' + renderChunkText(chunk.text) + '</div>';
  }).join('');

  const safeChunks = chunks || '<div class="run-chunk">Waiting for output...</div>';
  const engineLabel = entry.engine === 'claude' ? 'CLAUDE' : 'CODEX';

  return '<article class="run-card run-status-' + entry.status + '"><div class="run-card-header"><div><div class="card-label">' + engineLabel + '</div><div class="card-title">' + formatRunStatus(entry.status) + '</div></div></div><div class="run-card-body">' + safeChunks + '</div></article>';
}

function renderFeed() {
  const feed = document.getElementById('session-feed');
  feed.innerHTML = messages.map(renderEntry).join('');
  feed.scrollTop = feed.scrollHeight;
}

function toggleSettings(forceValue) {
  settingsDrawerOpen = typeof forceValue === 'boolean' ? forceValue : !settingsDrawerOpen;
  syncSettingsDrawer();
}

function syncSettingsDrawer() {
  const drawer = document.getElementById('settings-drawer');
  drawer.classList.toggle('open', settingsDrawerOpen);
  drawer.setAttribute('aria-hidden', String(!settingsDrawerOpen));
}

async function doAuth() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  try {
    const r = await fetch('/api/ping', { headers: { 'x-auth-token': t } });
    if (r.ok) {
      TOKEN = t;
      localStorage.setItem('agent_token', t);
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-shell').style.display = 'block';
      setStatus(true);
    } else {
      document.getElementById('auth-err').style.display = 'block';
    }
  } catch {
    document.getElementById('auth-err').textContent = '无法连接到服务器';
    document.getElementById('auth-err').style.display = 'block';
  }
}

async function checkAuth() {
  if (!TOKEN) return;
  try {
    const r = await fetch('/api/ping', { headers: { 'x-auth-token': TOKEN } });
    if (r.ok) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-shell').style.display = 'block';
      setStatus(true);
    }
  } catch {
    setStatus(false);
  }
}

function setStatus(ok) {
  connectionStatus = ok ? 'online' : 'offline';
  const pill = document.getElementById('connection-pill');
  const txt = document.getElementById('status-text');
  pill.classList.remove('online', 'offline');
  pill.classList.add(connectionStatus);
  txt.textContent = ok ? 'ONLINE' : 'OFFLINE';
  txt.style.color = ok ? 'var(--accent-2)' : 'var(--danger)';
}

function setEngine(e) {
  engine = e;
  document.getElementById('tab-claude').className = 'engine-chip' + (e === 'claude' ? ' active' : '');
  document.getElementById('tab-codex').className = 'engine-chip' + (e === 'codex' ? ' active' : '');
}

function clearChat() {
  messages = [];
  activeRunId = null;
  streamBuffer = '';
  renderFeed();
}

document.getElementById('token-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doAuth();
});

document.getElementById('prompt-input').addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    sendOrStop();
  }
});

document.getElementById('prompt-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 220) + 'px';
});

document.getElementById('settings-toggle').addEventListener('click', function() {
  toggleSettings(true);
});

document.getElementById('settings-close').addEventListener('click', function() {
  toggleSettings(false);
});

document.getElementById('clear-chat-btn').addEventListener('click', function() {
  clearChat();
  toggleSettings(false);
});

document.getElementById('settings-drawer').addEventListener('click', function(event) {
  if (event.target.id === 'settings-drawer') {
    toggleSettings(false);
  }
});

async function sendOrStop() {
  if (streaming) {
    await stopStream();
    return;
  }

  const input = document.getElementById('prompt-input');
  const prompt = input.value.trim();
  if (!prompt) return;

  const cwd = document.getElementById('cwd-input').value.trim();
  addUserMessage(prompt);
  activeRunId = startAgentRun(engine);
  input.value = '';
  input.style.height = 'auto';
  setStreaming(true);

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-auth-token': TOKEN },
      body: JSON.stringify({ engine: engine, prompt: prompt, cwd: cwd })
    });

    if (!resp.ok) {
      appendRunChunk(activeRunId, 'err', '[HTTP ' + resp.status + ']');
      finishAgentRun(activeRunId, 'error');
      setStreaming(false);
      return;
    }

    currentReader = resp.body.getReader();
    const decoder = new TextDecoder();
    let sseBuffer = '';

    while (true) {
      const result = await currentReader.read();
      if (result.done) break;
      sseBuffer += decoder.decode(result.value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const ev = JSON.parse(line.slice(6));
          if (ev.sessionId) currentSessionId = ev.sessionId;
          handleEvent(ev);
        } catch {}
      }
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      appendRunChunk(activeRunId, 'err', '[Connection error: ' + err.message + ']');
      finishAgentRun(activeRunId, 'error');
      setStatus(false);
    }
  } finally {
    setStreaming(false);
  }
}

function handleEvent(ev) {
  if (!activeRunId) return;

  switch (ev.type) {
    case 'text':
      appendRunChunk(activeRunId, 'text', ev.text);
      break;
    case 'tool':
      appendRunChunk(activeRunId, 'tool', ev.text);
      break;
    case 'tool_result':
      appendRunChunk(activeRunId, 'text', ev.text);
      break;
    case 'stderr':
      appendRunChunk(activeRunId, 'err', ev.text);
      break;
    case 'error':
      appendRunChunk(activeRunId, 'err', '[ERROR] ' + ev.text);
      finishAgentRun(activeRunId, 'error');
      break;
    case 'result':
      if (ev.text) appendRunChunk(activeRunId, 'text', ev.text);
      break;
    case 'done':
      finishAgentRun(activeRunId, 'completed');
      break;
    default:
      break;
  }
}

async function stopStream() {
  if (currentReader) {
    try {
      await currentReader.cancel();
    } catch {}
    currentReader = null;
  }

  if (currentSessionId) {
    fetch('/api/kill/' + currentSessionId, {
      method: 'POST',
      headers: { 'x-auth-token': TOKEN }
    }).catch(function() {});
    currentSessionId = null;
  }

  if (activeRunId) {
    appendRunChunk(activeRunId, 'err', '[已中断]');
    finishAgentRun(activeRunId, 'interrupted');
  }

  setStreaming(false);
}

function setStreaming(on) {
  streaming = on;
  const btn = document.getElementById('send-btn');
  btn.textContent = on ? '停止' : '发送';
  btn.className = 'send-btn' + (on ? ' stop' : '');
  if (!on) currentReader = null;
}

checkAuth();
</script>
</body>
</html>
